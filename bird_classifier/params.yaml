data:
  raw_dir: "data/raw/downloaded_dataset"
  train_split: 0.8
  val_split: 0.2
  random_seed: 11
  num_workers: 4

augmentation:
  enable: true
  random_resized_crop: 340
  random_horizontal_flip: true
  random_vertical_flip: false
  random_rotation: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1

model:
  name: "resnet152"
  num_classes: 5
  pretrained: true
  freeze_backbone: true
  fc_hidden_size: 1024

training:
  batch_size: 64
  num_epochs: 10
  learning_rate: 0.001
  weight_decay: 0.001
  optimizer: "adam"
  save_best: true
  early_stopping_patience: 3

evaluation:
  batch_size: 64

inference:
  model_path: "models/best_model.pth"
  image_size: 340
  top_k: 10
  host: "0.0.0.0"
  port: 7860

faiss:
  index_type: "IP"  # L2 или IP (inner product)
  embedding_dim: 2048

output:
  model_dir: "models"
  metrics_dir: "metrics"
  plots_dir: "plots"
  outputs_dir: "outputs"
  embeddings_dir: "data/embeddings"
  faiss_dir: "faiss_index"
